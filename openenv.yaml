name: "ExecEnv"
version: "1.0.0"
description: "AI Executive Assistant environment for Email and Calendar triage."
benchmark: "exec_env"
tags: ["assistant", "pydantic", "real-world", "email", "calendar"]
author: "Antigravity Agent"
tasks:
  - name: "triage"
    difficulty: "easy"
    description: "Label urgent emails and delete spam."
  - name: "schedule"
    difficulty: "medium"
    description: "Book a meeting based on email availability."
  - name: "reschedule"
    difficulty: "hard"
    description: "Handle scheduling conflicts by rescheduling low-priority items."
action_space:
  type: "dict"
  description: "Typed action with action_type and parameters for email/calendar management."
observation_space:
  type: "dict"
  description: "Typed observation with emails and calendar lists."
reward_range: [0.0, 1.0]
